---
- name: Bootstrap GridSync Master Node
  hosts: localhost
  connection: local
  become: yes

  tasks:
    # 1. THE SENIOR FLEX: Create a Swapfile to prevent RAM crashes
    - name: Create a 2GB swap file
      command: fallocate -l 2G /swapfile
      args:
        creates: /swapfile

    - name: Set swap file permissions
      file:
        path: /swapfile
        mode: '0600'

    - name: Make swap file
      command: mkswap /swapfile
      ignore_errors: yes

    - name: Enable swap
      command: swapon /swapfile
      ignore_errors: yes

    # 2. Install Docker
    - name: Install Docker
      apt:
        name: docker.io
        state: present
        update_cache: yes

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    # 3. Install Lightweight Kubernetes (K3s)
    - name: Download and install K3s
      shell: curl -sfL https://get.k3s.io | sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Give ubuntu user read access to Kubernetes config
      file:
        path: /etc/rancher/k3s/k3s.yaml
        mode: '0644'

    # 4. Install Jenkins (Requires Java)
    - name: Install Java (OpenJDK 17) for Jenkins
      apt:
        name: openjdk-17-jre
        state: present

    - name: Add Jenkins Repository Key
      shell: curl -fsSL https://pkg.jenkins.io/debian-stable/jenkins.io-2026.key | sudo tee /usr/share/keyrings/jenkins-keyring.asc > /dev/null

    - name: Add Jenkins Repository
      shell: echo "deb [signed-by=/usr/share/keyrings/jenkins-keyring.asc] https://pkg.jenkins.io/debian-stable binary/" | sudo tee /etc/apt/sources.list.d/jenkins.list > /dev/null

    - name: Install Jenkins
      apt:
        name: jenkins
        state: present
        update_cache: yes
