apiVersion: apps/v1
kind: Deployment
metadata:
  name: gridsync-demo-app
  namespace: virginia-dirty
  labels:
    app: gridsync-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gridsync-demo
  template:
    metadata:
      labels:
        app: gridsync-demo
    spec:
      containers:
      - name: demo-app
        # Must use the fully-qualified docker.io/library/ prefix.
        # When "docker save | k3s ctr images import" stores an image,
        # containerd records it as docker.io/library/<name>:<tag>.
        # Using the short name "gridsync-demo-app:latest" here causes
        # ErrImageNeverPull because K3s cannot match it to the stored ref.
        image: docker.io/library/gridsync-demo-app:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
        env:
        - name: PORT
          value: "5000"
        - name: EXPORTER_URL
          value: "http://localhost:8000/metrics"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"

---
apiVersion: v1
kind: Service
metadata:
  name: gridsync-demo-svc
  namespace: virginia-dirty
spec:
  type: NodePort
  selector:
    app: gridsync-demo
  ports:
  - protocol: TCP
    port: 5000
    targetPort: 5000
    nodePort: 30080
