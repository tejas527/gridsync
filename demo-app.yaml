apiVersion: apps/v1
kind: Deployment
metadata:
  name: gridsync-demo-app
  namespace: virginia-dirty
  labels:
    app: gridsync-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gridsync-demo
  template:
    metadata:
      labels:
        app: gridsync-demo
    spec:
      containers:
      - name: demo-app
        image: gridsync-demo-app:latest
        imagePullPolicy: Always          # Image built locally on EC2
        ports:
        - containerPort: 5000
        readinessProbe:          # Give it a little more time to wake up
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
        env:
        - name: PORT
          value: "5000"
        - name: EXPORTER_URL
          value: "http://localhost:8000/metrics"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"

---
apiVersion: v1
kind: Service
metadata:
  name: gridsync-demo-svc
  namespace: virginia-dirty
spec:
  type: NodePort
  selector:
    app: gridsync-demo
  ports:
  - protocol: TCP
    port: 5000
    targetPort: 5000
    nodePort: 30080        # http://EC2_IP:30080 — the live demo URL
