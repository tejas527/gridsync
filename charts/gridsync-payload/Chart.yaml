apiVersion: v2
name: gridsync-payload
description: |
  GridSync dummy workload — a lightweight nginx deployment used to simulate
  carbon-aware pod migration across K3s namespaces. Deployed per-namespace
  (virginia-dirty, ireland-mixed, sweden-green) with replica counts controlled
  by the carbon scheduler at runtime.
