apiVersion: v1
kind: Service
metadata:
  name: gridsync-payload-svc
  labels:
    app: {{ .Values.appLabel }}
    release: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ .Values.appLabel }}
  ports:
  - protocol: TCP
    port: {{ .Values.service.port }}
    targetPort: {{ .Values.service.targetPort }}
